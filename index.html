<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>⚽ BetHub Live - Real Matches & AI Chatbot</title>
  <style>
    :root {
      --bg: #0b0f15;
      --surface: #141a23;
      --surface2: #1c2330;
      --border: #2a3343;
      --text: #e3e9f2;
      --text2: #b0b8c6;
      --muted: #6b7280;
      --green: #3fb950;
      --green-glow: rgba(63,185,80,0.3);
      --blue: #1f6feb;
      --red: #f85149;
      --yellow: #d2991d;
      --radius: 16px;
      --radius-sm: 10px;
      --font-mono: 'SF Mono','Fira Code','Consolas',monospace;
      --transition: 0.2s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter',system-ui,-apple-system,sans-serif;
      background: var(--bg); color: var(--text);
      line-height:1.5; min-height:100vh;
    }
    .app { display:flex; height:100vh; overflow:hidden; }
    .main-panel { flex:1 1 70%; display:flex; flex-direction:column; overflow-y:auto; }
    .chat-panel {
      width: 380px; background: var(--surface); border-left:1px solid var(--border);
      display:flex; flex-direction:column; transition: all 0.3s ease;
      box-shadow: -8px 0 24px rgba(0,0,0,0.5); z-index:10;
    }
    .chat-panel.collapsed { width:50px; }
    .header {
      background: rgba(11,15,21,0.9); backdrop-filter:blur(16px);
      padding:12px 20px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:15px; flex-wrap:wrap;
      position:sticky; top:0; z-index:50;
    }
    .logo { font-weight:800; font-size:1.4rem; cursor:pointer; }
    .logo span:first-child { color:var(--green); }
    .search-box { flex:1; min-width:200px; position:relative; }
    .search-box input {
      width:100%; padding:10px 16px 10px 40px; border-radius:40px;
      border:2px solid var(--border); background:var(--surface2); color:var(--text);
      font-size:0.9rem; outline:none;
    }
    .search-box input:focus { border-color:var(--green); box-shadow:0 0 0 3px var(--green-glow); }
    .search-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); }
    .autocomplete {
      position:absolute; top:calc(100% + 6px); left:0; right:0; background:var(--surface2);
      border:1px solid var(--border); border-radius:var(--radius-sm); max-height:320px;
      overflow-y:auto; display:none; z-index:200; box-shadow:0 12px 30px rgba(0,0,0,0.6);
    }
    .autocomplete.active { display:block; }
    .autocomplete-item {
      padding:12px 16px; cursor:pointer; display:flex; align-items:center; gap:12px;
      border-bottom:1px solid rgba(255,255,255,0.05);
    }
    .autocomplete-item:hover { background:var(--surface); }
    .live-badge { background:var(--red); color:#fff; font-size:0.7rem; padding:2px 8px; border-radius:12px; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .content { padding:20px; flex:1; }
    .welcome { text-align:center; padding:60px 20px; }
    .match-detail { display:none; }
    .match-detail.active { display:block; }
    .hero { background:var(--surface); border-radius:var(--radius); padding:24px; margin-bottom:20px; border:1px solid var(--border); }
    .score-row { display:flex; align-items:center; justify-content:space-around; text-align:center; margin:20px 0; }
    .team { flex:1; }
    .team .flag { font-size:3rem; }
    .team .name { font-weight:700; font-size:1.2rem; }
    .score { font-size:3.5rem; font-weight:900; font-family:var(--font-mono); }
    .tabs { display:flex; gap:5px; background:var(--surface); padding:5px; border-radius:var(--radius-sm); margin-bottom:16px; flex-wrap:wrap; }
    .tab { flex:1; padding:10px; text-align:center; font-weight:600; border-radius:8px; cursor:pointer; color:var(--text2); border:none; background:transparent; }
    .tab.active { background:var(--green); color:#000; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
    .stats-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap:12px; }
    .stat-card { background:var(--surface); padding:16px; border-radius:var(--radius-sm); text-align:center; border:1px solid var(--border); }
    .stat-card .value { font-size:1.8rem; font-weight:700; }
    .table-wrap { overflow-x:auto; border-radius:var(--radius-sm); border:1px solid var(--border); }
    table { width:100%; border-collapse:collapse; font-size:0.85rem; }
    th { background:var(--surface); padding:10px; text-align:left; color:var(--muted); }
    td { padding:10px; border-bottom:1px solid rgba(255,255,255,0.05); }
    .chat-header { padding:16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--surface2); }
    .chat-messages { flex:1; overflow-y:auto; padding:15px; display:flex; flex-direction:column; gap:12px; }
    .message { max-width:90%; padding:12px 16px; border-radius:16px; font-size:0.9rem; line-height:1.4; }
    .message.bot { background:var(--surface2); align-self:flex-start; }
    .message.user { background:var(--blue); align-self:flex-end; color:#fff; }
    .chat-input-area { padding:12px; border-top:1px solid var(--border); display:flex; gap:8px; }
    .chat-input-area input { flex:1; padding:10px 14px; border-radius:20px; border:1px solid var(--border); background:var(--surface2); color:var(--text); outline:none; }
    .toggle-chat { background:transparent; border:none; color:var(--text); font-size:1.2rem; cursor:pointer; }
    @media (max-width:900px) {
      .app { flex-direction:column; }
      .chat-panel { width:100%; height:40vh; border-left:none; border-top:1px solid var(--border); }
      .chat-panel.collapsed { height:50px; }
      .main-panel { height:60vh; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="main-panel">
    <div class="header">
      <div class="logo" onclick="resetAll()"><span>⚽</span> BetHub <span style="color:var(--text);">Live</span></div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Tìm trận đấu thực tế... (vd: World Cup, Argentina)" autocomplete="off">
        <span class="search-icon">🔍</span>
        <div class="autocomplete" id="autocomplete"></div>
      </div>
      <button id="liveToggle" style="padding:8px 16px; border-radius:20px; background:var(--green); color:#000; border:none; font-weight:bold; cursor:pointer;">🔴 LIVE ON</button>
      <button id="refreshData" style="padding:8px 12px; border-radius:20px; background:var(--blue); color:#fff; border:none; cursor:pointer;">🔄 Tải lại</button>
    </div>
    <div class="content" id="mainContent">
      <div class="welcome" id="welcome">
        <h2>📡 Đang tải dữ liệu trận đấu thực tế...</h2>
        <p>Trang tự động lấy lịch thi đấu từ TheSportsDB. Hãy chọn trận để xem chi tiết.</p>
      </div>
      <div class="match-detail" id="matchDetail"></div>
    </div>
  </div>

  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <span>🤖 AI Trợ lý</span>
      <button class="toggle-chat" onclick="toggleChat()">◀</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot">👋 Chào bạn! Tôi sẽ giúp bạn phân tích trận đấu. Hãy chọn một trận từ danh sách.</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Hỏi về trận đấu..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()" style="background:var(--green); border:none; border-radius:50%; width:36px; height:36px; color:#000; font-weight:bold;">➤</button>
    </div>
  </div>
</div>

<script>
  (() => {
    // --- API CONFIG ---
    const API_KEY = '1'; // TheSportsDB free dev key
    const BASE_URL = 'https://www.thesportsdb.com/api/v1/json';
    
    // --- GLOBAL STATE ---
    let allMatches = [];        // Dữ liệu từ API
    let currentMatch = null;
    let liveInterval = null;
    let liveActive = true;

    // --- DOM ---
    const searchInput = document.getElementById('searchInput');
    const autocompleteDiv = document.getElementById('autocomplete');
    const welcomeDiv = document.getElementById('welcome');
    const matchDetailDiv = document.getElementById('matchDetail');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatPanel = document.getElementById('chatPanel');
    const liveToggleBtn = document.getElementById('liveToggle');
    const refreshBtn = document.getElementById('refreshData');

    // --- HELPERS ---
    const normalize = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
    const getTeamName = (str) => str || 'Unknown';
    const getFlagFromName = (name) => {
      const flags = {'Manchester United':'🔴','Liverpool':'🟥','Arsenal':'🔴⚪','Chelsea':'🔵🦁','Real Madrid':'⚪👑','Barcelona':'🔵🔴','Bayern Munich':'🔴⚪','PSG':'🔵🔴','Inter Milan':'🔵⚫','AC Milan':'🔴⚫','Juventus':'⚫⚪','Tottenham':'⚪🐓','Napoli':'🔵','Dortmund':'🟡⚫','Atletico Madrid':'🔴⚪'};
      for (let key in flags) if (name.toLowerCase().includes(key.toLowerCase())) return flags[key];
      return '🏴';
    };

    // --- FETCH REAL DATA ---
    async function fetchLiveMatches(dateStr = null) {
      try {
        // Mặc định lấy ngày mai (World Cup 2026)
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const yyyy = tomorrow.getFullYear();
        const mm = String(tomorrow.getMonth() + 1).padStart(2,'0');
        const dd = String(tomorrow.getDate()).padStart(2,'0');
        const queryDate = dateStr || `${yyyy}-${mm}-${dd}`;
        
        welcomeDiv.innerHTML = '<h2>⏳ Đang tải lịch thi đấu...</h2>';
        const res = await fetch(`${BASE_URL}/${API_KEY}/eventsday.php?d=${queryDate}&s=Soccer`);
        const data = await res.json();
        
        if (data && data.events && data.events.length > 0) {
          allMatches = data.events.map(event => ({
            id: event.idEvent,
            home: event.strHomeTeam,
            away: event.strAwayTeam,
            league: event.strLeague || 'Unknown League',
            date: event.dateEvent || queryDate,
            time: event.strTime || '00:00',
            score: event.intHomeScore !== null ? `${event.intHomeScore}-${event.intAwayScore}` : '?-?',
            status: event.strStatus || 'Scheduled',
            homeGoals: event.intHomeScore || 0,
            awayGoals: event.intAwayScore || 0,
            // Dữ liệu mô phỏng cho thống kê (sẽ được cập nhật live)
            possession: 50,
            shotsH: Math.floor(Math.random()*10+5),
            shotsA: Math.floor(Math.random()*10+5),
            cornersH: Math.floor(Math.random()*5+1),
            cornersA: Math.floor(Math.random()*5+1),
          }));
          welcomeDiv.innerHTML = `<h2>✅ Đã tải ${allMatches.length} trận đấu ngày ${queryDate}</h2><p>Gõ tên đội hoặc chọn từ gợi ý bên dưới.</p>`;
          addBotMessage(`📅 Lịch thi đấu ngày ${queryDate}: ${allMatches.length} trận. Hãy chọn một trận để phân tích.`);
        } else {
          // Fallback dữ liệu mẫu nếu API không có trận nào
          allMatches = getFallbackMatches(queryDate);
          welcomeDiv.innerHTML = `<h2>⚠️ Không có dữ liệu từ API, hiển thị dữ liệu mẫu</h2>`;
          addBotMessage('⚠️ Dữ liệu thực tế không khả dụng. Đang dùng dữ liệu mô phỏng.');
        }
      } catch (err) {
        console.error('Fetch error:', err);
        allMatches = getFallbackMatches();
        welcomeDiv.innerHTML = '<h2>⚠️ Lỗi kết nối, dùng dữ liệu mẫu</h2>';
        addBotMessage('❌ Lỗi mạng. Dữ liệu hiện tại là mô phỏng.');
      }
      // Hiển thị tất cả nếu ô tìm kiếm đang focus
      if (document.activeElement === searchInput) {
        renderAutocomplete(allMatches);
      }
    }

    function getFallbackMatches(dateStr = '2026-06-30') {
      return [
        { id:101, home:'Argentina', away:'France', league:'FIFA World Cup', date:dateStr, time:'19:00', score:'?-?', status:'Scheduled', homeGoals:0, awayGoals:0, possession:50, shotsH:0, shotsA:0, cornersH:0, cornersA:0 },
        { id:102, home:'Brazil', away:'England', league:'FIFA World Cup', date:dateStr, time:'22:00', score:'?-?', status:'Scheduled', homeGoals:0, awayGoals:0, possession:50, shotsH:0, shotsA:0, cornersH:0, cornersA:0 }
      ];
    }

    // --- SEARCH & AUTOCOMPLETE ---
    function searchMatches(query) {
      if (!query) return allMatches;
      const q = normalize(query);
      return allMatches.filter(m => {
        const txt = normalize(`${m.home} ${m.away} ${m.league}`);
        return txt.includes(q);
      });
    }

    function renderAutocomplete(results) {
      autocompleteDiv.innerHTML = '';
      if (!results.length) {
        autocompleteDiv.innerHTML = '<div style="padding:16px;color:var(--muted)">Không tìm thấy trận đấu</div>';
        autocompleteDiv.classList.add('active');
        return;
      }
      results.slice(0,12).forEach(m => {
        const div = document.createElement('div');
        div.className = 'autocomplete-item';
        const liveIcon = m.status.includes('Live') ? '<span class="live-badge">LIVE</span>' : '';
        div.innerHTML = `
          <span>${getFlagFromName(m.home)} ${m.home}</span> vs <span>${getFlagFromName(m.away)} ${m.away}</span>
          <span style="margin-left:auto;color:var(--green);font-weight:bold;">${m.score}</span>
          ${liveIcon}
          <small style="color:var(--muted);">${m.league}</small>
        `;
        div.onclick = () => selectMatch(m);
        autocompleteDiv.appendChild(div);
      });
      autocompleteDiv.classList.add('active');
    }

    function selectMatch(match) {
      currentMatch = match;
      searchInput.value = `${match.home} vs ${match.away}`;
      autocompleteDiv.classList.remove('active');
      welcomeDiv.style.display = 'none';
      matchDetailDiv.classList.add('active');
      renderMatchDetail(match);
      addBotMessage(`📊 Đã chọn trận **${match.home} vs ${match.away}** (${match.league}). Bạn có thể hỏi tôi về thống kê, kèo, dự đoán.`);
      startLiveUpdates();
    }

    function resetAll() {
      currentMatch = null; stopLiveUpdates();
      searchInput.value = ''; autocompleteDiv.classList.remove('active');
      welcomeDiv.style.display = ''; matchDetailDiv.classList.remove('active');
      addBotMessage('👋 Về trang chủ. Hãy chọn trận đấu khác.');
    }

    // --- RENDER MATCH DETAIL ---
    function renderMatchDetail(m) {
      const hFlag = getFlagFromName(m.home);
      const aFlag = getFlagFromName(m.away);
      const html = `
        <div class="hero">
          <span style="background:var(--blue); padding:4px 12px; border-radius:20px; font-size:0.75rem;">${m.league}</span>
          <span style="margin-left:10px; color:var(--muted);">${m.date} ${m.time}</span>
          <span style="float:right; color:${m.status.includes('Live')?'var(--red)':'var(--text2)'}; font-weight:bold;">${m.status}</span>
          <div class="score-row">
            <div class="team"><span class="flag">${hFlag}</span><div class="name">${m.home}</div></div>
            <div class="score">${m.score}</div>
            <div class="team"><span class="flag">${aFlag}</span><div class="name">${m.away}</div></div>
          </div>
          <div style="display:flex; justify-content:center; gap:20px; color:var(--text2);">
            <span>⚽ Sút: ${m.shotsH} - ${m.shotsA}</span>
            <span>🎯 Góc: ${m.cornersH} - ${m.cornersA}</span>
            <span>⏱️ Kiểm soát: ${m.possession}% - ${100-m.possession}%</span>
          </div>
        </div>
        <div class="tabs" id="tabsContainer">
          <button class="tab active" data-tab="stats">📊 Thống kê</button>
          <button class="tab" data-tab="h2h">⚔️ Đối đầu</button>
          <button class="tab" data-tab="odds">💰 Kèo</button>
          <button class="tab" data-tab="percent">🎯 Phần trăm</button>
        </div>
        <div id="tabContents">
          <div class="tab-content active" id="tab-stats">${generateStats(m)}</div>
          <div class="tab-content" id="tab-h2h">${generateH2H(m)}</div>
          <div class="tab-content" id="tab-odds">${generateOdds(m)}</div>
          <div class="tab-content" id="tab-percent">${generatePercent(m)}</div>
        </div>
      `;
      matchDetailDiv.innerHTML = html;
      document.querySelectorAll('#tabsContainer .tab').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#tabsContainer .tab').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          const tabId = btn.dataset.tab;
          document.querySelectorAll('#tabContents .tab-content').forEach(c=>c.classList.remove('active'));
          document.getElementById(`tab-${tabId}`).classList.add('active');
        });
      });
    }

    function generateStats(m) {
      return `<div class="stats-grid">
        <div class="stat-card"><span>⚽</span><div class="value">${m.shotsH}</div>Sút (${m.home})</div>
        <div class="stat-card"><span>⚽</span><div class="value">${m.shotsA}</div>Sút (${m.away})</div>
        <div class="stat-card"><span>🎯</span><div class="value">${Math.floor(m.shotsH*0.6)}</div>Trúng đích</div>
        <div class="stat-card"><span>🎯</span><div class="value">${Math.floor(m.shotsA*0.5)}</div>Trúng đích</div>
        <div class="stat-card"><span>🏳️</span><div class="value">${m.cornersH}</div>Góc</div>
        <div class="stat-card"><span>🏳️</span><div class="value">${m.cornersA}</div>Góc</div>
        <div class="stat-card"><span>⏱️</span><div class="value">${m.possession}%</div>KS bóng</div>
        <div class="stat-card"><span>⏱️</span><div class="value">${100-m.possession}%</div>KS bóng</div>
      </div>`;
    }

    function generateH2H(m) {
      const rows = [
        {date:'2026-06-15', league:'World Cup', home:'Argentina', away:'France', score:'2-1'},
        {date:'2022-12-18', league:'World Cup Final', home:'Argentina', away:'France', score:'3-3 (4-2 pen)'},
        {date:'2018-06-30', league:'World Cup', home:'France', away:'Argentina', score:'4-3'},
      ];
      return `<div class="table-wrap"><table>
        <tr><th>Ngày</th><th>Giải</th><th>Đội nhà</th><th>Tỷ số</th><th>Đội khách</th></tr>
        ${rows.map(r=>`<tr><td>${r.date}</td><td>${r.league}</td><td>${r.home}</td><td><b>${r.score}</b></td><td>${r.away}</td></tr>`).join('')}
      </table></div>`;
    }

    function generateOdds(m) {
      return `<div class="stats-grid">
        <div class="stat-card"><b>Châu Á</b><br>${m.home}: 0.92<br>Hòa: 0.98<br>${m.away}: 1.05</div>
        <div class="stat-card"><b>Châu Âu</b><br>1: ${(2.1+Math.random()).toFixed(2)}<br>X: ${(3.2+Math.random()).toFixed(2)}<br>2: ${(2.8+Math.random()).toFixed(2)}</div>
        <div class="stat-card"><b>Tài Xỉu 2.5</b><br>Tài: 0.89<br>Xỉu: 0.95</div>
      </div>`;
    }

    function generatePercent(m) {
      return `<div class="stats-grid">
        <div class="stat-card"><span>🟢</span><div class="value" style="color:var(--green)">55%</div>${m.home} thắng</div>
        <div class="stat-card"><span>🟡</span><div class="value" style="color:var(--yellow)">25%</div>Hòa</div>
        <div class="stat-card"><span>🔴</span><div class="value" style="color:var(--red)">20%</div>${m.away} thắng</div>
      </div>`;
    }

    // --- LIVE UPDATE (mô phỏng tăng phút và chỉ số) ---
    function startLiveUpdates() {
      stopLiveUpdates();
      if (!liveActive || !currentMatch || !currentMatch.status.includes('Live')) return;
      liveInterval = setInterval(() => {
        if (!currentMatch) return;
        currentMatch.shotsH += Math.random()>0.7?1:0;
        currentMatch.shotsA += Math.random()>0.7?1:0;
        currentMatch.cornersH += Math.random()>0.8?1:0;
        currentMatch.cornersA += Math.random()>0.8?1:0;
        currentMatch.possession = Math.min(70, Math.max(30, currentMatch.possession + (Math.random()>0.5?1:-1)));
        if (Math.random()>0.92) {
          if (Math.random()>0.5) currentMatch.homeGoals++; else currentMatch.awayGoals++;
          currentMatch.score = `${currentMatch.homeGoals}-${currentMatch.awayGoals}`;
          addBotMessage(`⚡ Bàn thắng! Tỷ số mới: ${currentMatch.score}`);
        }
        renderMatchDetail(currentMatch);
      }, 8000);
    }

    function stopLiveUpdates() {
      if (liveInterval) { clearInterval(liveInterval); liveInterval = null; }
    }

    // --- CHATBOT (AI đơn giản) ---
    function addBotMessage(text) {
      const div = document.createElement('div');
      div.className = 'message bot'; div.innerHTML = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }
    function addUserMessage(text) {
      const div = document.createElement('div');
      div.className = 'message user'; div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function processBotReply(input) {
      if (!currentMatch) return 'Bạn chưa chọn trận đấu. Hãy gõ tên đội hoặc chọn từ danh sách.';
      const m = currentMatch;
      const q = normalize(input);
      if (q.includes('tỷ số')||q.includes('score')) return `Tỷ số: ${m.home} ${m.score} ${m.away}. (${m.status})`;
      if (q.includes('thống kê')||q.includes('sút')) return `📊 ${m.home}: Sút ${m.shotsH}, Góc ${m.cornersH}, KS ${m.possession}%. ${m.away}: Sút ${m.shotsA}, Góc ${m.cornersA}, KS ${100-m.possession}%.`;
      if (q.includes('kèo')||q.includes('cược')) return `💰 Kèo Châu Á: ${m.home} 0.92, Hòa 0.98, ${m.away} 1.05.`;
      if (q.includes('lịch sử')||q.includes('đối đầu')) return `⚔️ Lịch sử: Argentina thắng 2/3 lần gặp gần nhất.`;
      if (q.includes('dự đoán')) return `🔮 Dựa trên phong độ, ${m.home} có 55% cơ hội thắng.`;
      return `🤔 Tôi có thể trả lời về tỷ số, thống kê, kèo, lịch sử đối đầu. Hãy hỏi cụ thể nhé!`;
    }

    window.sendMessage = function() {
      const text = chatInput.value.trim();
      if (!text) return;
      addUserMessage(text);
      chatInput.value = '';
      setTimeout(() => {
        const reply = processBotReply(text);
        addBotMessage(reply);
      }, 500);
    };

    window.toggleChat = function() {
      chatPanel.classList.toggle('collapsed');
    };

    // --- EVENT LISTENERS ---
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim();
      if (!q) { autocompleteDiv.classList.remove('active'); return; }
      renderAutocomplete(searchMatches(q));
    });
    searchInput.addEventListener('focus', () => {
      if (searchInput.value.trim()) renderAutocomplete(searchMatches(searchInput.value));
      else renderAutocomplete(allMatches);
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-box')) autocompleteDiv.classList.remove('active');
    });

    liveToggleBtn.addEventListener('click', () => {
      liveActive = !liveActive;
      liveToggleBtn.textContent = liveActive ? '🔴 LIVE ON' : '⏸ LIVE OFF';
      liveToggleBtn.style.background = liveActive ? 'var(--green)' : '#555';
      if (liveActive && currentMatch) startLiveUpdates(); else stopLiveUpdates();
    });

    refreshBtn.addEventListener('click', () => {
      fetchLiveMatches();
      addBotMessage('🔄 Đang tải lại dữ liệu trận đấu...');
    });

    // Khởi động
    window.resetAll = resetAll;
    fetchLiveMatches(); // Lấy dữ liệu thực tế khi load trang
  })();
</script>
</body>
</html>
