<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ BetHub - Thống Kê & Kèo Bóng Đá</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2333;
            --bg-card-hover: #212a3b;
            --border: #2a3343;
            --text-primary: #e6edf3;
            --text-secondary: #b0b8c4;
            --text-muted: #6e7681;
            --accent: #3fb950;
            --accent-glow: #3fb95066;
            --accent2: #1f6feb;
            --accent2-glow: #1f6feb55;
            --red: #f85149;
            --red-glow: #f8514955;
            --yellow: #d2991d;
            --yellow-glow: #d2991d55;
            --orange: #f0883e;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.35);
            --shadow-glow: 0 0 40px rgba(63, 185, 80, 0.08);
            --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(63, 185, 80, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(31, 111, 235, 0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(210, 153, 29, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== HEADER ========== */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13, 17, 23, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: 0 1px 20px rgba(0, 0, 0, 0.4);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            text-decoration: none;
            white-space: nowrap;
            user-select: none;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent), #2ea043);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .logo span {
            background: linear-gradient(135deg, #e6edf3, #c0c8d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo .highlight {
            background: linear-gradient(135deg, #3fb950, #6ddb8e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Search */
        .search-wrapper {
            flex: 1;
            min-width: 280px;
            max-width: 550px;
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 13px 18px 13px 46px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
            transition: var(--transition);
            outline: none;
            letter-spacing: 0.2px;
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow), 0 0 30px rgba(63, 185, 80, 0.06);
            background: #1a2030;
        }
        .search-icon {
            position: absolute;
            left: 17px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
            transition: var(--transition);
        }
        .search-input:focus~.search-icon,
        .search-input:focus+.search-icon {
            color: var(--accent);
        }
        .search-icon {
            position: absolute;
            left: 17px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
            transition: var(--transition);
        }
        .search-input:focus~.search-icon {
            color: var(--accent);
        }

        /* Autocomplete dropdown */
        .autocomplete-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-card);
            max-height: 360px;
            overflow-y: auto;
            z-index: 200;
            display: none;
            animation: fadeSlideDown 0.2s ease-out;
        }
        .autocomplete-dropdown.active {
            display: block;
        }
        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .autocomplete-item {
            padding: 13px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: var(--transition);
            border-bottom: 1px solid rgba(42, 51, 67, 0.5);
        }
        .autocomplete-item:last-child {
            border-bottom: none;
        }
        .autocomplete-item:hover {
            background: var(--bg-card-hover);
        }
        .autocomplete-item .match-teams {
            font-weight: 600;
            font-size: 0.9rem;
            flex: 1;
        }
        .autocomplete-item .match-league {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: 3px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .autocomplete-item .match-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }
        .no-result {
            padding: 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* ========== MAIN LAYOUT ========== */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
            padding: 28px 20px 40px;
        }

        /* Welcome state */
        .welcome-state {
            text-align: center;
            padding: 80px 20px;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .welcome-state .welcome-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-18px);
            }
        }
        .welcome-state h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        .welcome-state p {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 500px;
            margin: 0 auto;
        }

        /* Match detail card */
        .match-detail {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }
        .match-detail.active {
            display: block;
        }

        /* Hero match card */
        .match-hero {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 32px 28px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card), var(--shadow-glow);
            position: relative;
            overflow: hidden;
        }
        .match-hero::before {
            content: '';
            position: absolute;
            top: -60px;
            right: -60px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(63, 185, 80, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .match-hero .league-tag {
            display: inline-block;
            background: var(--accent2);
            color: #fff;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.3px;
        }
        .match-hero .match-date-time {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .match-hero .score-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 16px 0;
        }
        .team-block {
            text-align: center;
            flex: 1;
            min-width: 140px;
        }
        .team-block .team-name {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .team-block .team-flag {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 6px;
        }
        .score-center {
            text-align: center;
            flex: 0 0 auto;
        }
        .score-center .score-num {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            font-family: var(--font-mono);
            background: linear-gradient(180deg, #ffffff, #b0b8c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .score-center .score-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .vs-badge {
            display: inline-block;
            background: var(--bg-secondary);
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        /* ========== TABS ========== */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: var(--bg-secondary);
            padding: 5px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 18px;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
            background: transparent;
            color: var(--text-secondary);
            letter-spacing: 0.2px;
            white-space: nowrap;
        }
        .tab-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
        }
        .tab-btn.active {
            background: var(--accent);
            color: #000;
            box-shadow: 0 2px 12px var(--accent-glow);
            font-weight: 700;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.35s ease-out;
        }
        .tab-content.active {
            display: block;
        }

        /* ========== STATS GRID ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 20px;
            border: 1px solid var(--border);
            text-align: center;
            transition: var(--transition);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
        }
        .stat-card:hover {
            border-color: #3a4a5f;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
        }
        .stat-card .stat-icon {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .stat-card .stat-value {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            font-family: var(--font-mono);
        }
        .stat-card .stat-label {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-value.green {
            color: var(--accent);
        }
        .stat-value.red {
            color: var(--red);
        }
        .stat-value.yellow {
            color: var(--yellow);
        }
        .stat-value.blue {
            color: var(--accent2);
        }

        /* Progress bars */
        .progress-group {
            margin-bottom: 14px;
        }
        .progress-label-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .progress-bar-wrap {
            height: 10px;
            background: var(--bg-secondary);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease-out;
        }
        .fill-green {
            background: linear-gradient(90deg, #2ea043, #3fb950);
        }
        .fill-blue {
            background: linear-gradient(90deg, #1a5dc4, #1f6feb);
        }
        .fill-red {
            background: linear-gradient(90deg, #c0392b, #f85149);
        }
        .fill-yellow {
            background: linear-gradient(90deg, #b8860b, #d2991d);
        }
        .fill-orange {
            background: linear-gradient(90deg, #d47128, #f0883e);
        }

        /* ========== HISTORY TABLE ========== */
        .history-table-wrap {
            overflow-x: auto;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 650px;
        }
        .history-table thead th {
            background: var(--bg-secondary);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        .history-table tbody td {
            padding: 13px 16px;
            border-bottom: 1px solid rgba(42, 51, 67, 0.5);
            white-space: nowrap;
        }
        .history-table tbody tr {
            transition: var(--transition);
        }
        .history-table tbody tr:hover {
            background: var(--bg-card-hover);
        }
        .result-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.78rem;
            letter-spacing: 0.3px;
        }
        .result-win {
            background: rgba(63, 185, 80, 0.18);
            color: #3fb950;
        }
        .result-loss {
            background: rgba(248, 81, 73, 0.18);
            color: #f85149;
        }
        .result-draw {
            background: rgba(210, 153, 29, 0.18);
            color: #d2991d;
        }

        /* ========== ODDS CARDS ========== */
        .odds-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }
        .odds-card {
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
        }
        .odds-card:hover {
            border-color: #3a4a5f;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.35);
        }
        .odds-card h4 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 14px;
            text-align: center;
        }
        .odds-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(42, 51, 67, 0.4);
            font-size: 0.9rem;
        }
        .odds-row:last-child {
            border-bottom: none;
        }
        .odds-value {
            font-weight: 700;
            font-family: var(--font-mono);
            font-size: 1.1rem;
            background: var(--bg-secondary);
            padding: 6px 14px;
            border-radius: 20px;
            transition: var(--transition);
        }
        .odds-value.highlight-odds {
            background: rgba(63, 185, 80, 0.2);
            color: #3fb950;
            box-shadow: 0 0 12px rgba(63, 185, 80, 0.15);
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .header {
                padding: 10px 14px;
                gap: 12px;
            }
            .logo {
                font-size: 1.2rem;
            }
            .logo-icon {
                width: 34px;
                height: 34px;
                font-size: 1.3rem;
                border-radius: 10px;
            }
            .search-wrapper {
                min-width: 200px;
                flex: 1;
            }
            .search-input {
                padding: 11px 14px 11px 38px;
                font-size: 0.85rem;
            }
            .match-hero {
                padding: 20px 16px;
            }
            .team-block .team-name {
                font-size: 1.1rem;
            }
            .team-block .team-flag {
                font-size: 2.5rem;
            }
            .score-center .score-num {
                font-size: 2.5rem;
            }
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 10px;
            }
            .stat-card {
                padding: 14px;
            }
            .stat-card .stat-value {
                font-size: 1.5rem;
            }
            .tabs {
                gap: 3px;
            }
            .tab-btn {
                padding: 10px 12px;
                font-size: 0.8rem;
            }
            .odds-grid {
                grid-template-columns: 1fr;
            }
        }
        @media (max-width: 400px) {
            .score-display {
                gap: 10px;
            }
            .team-block .team-name {
                font-size: 0.95rem;
            }
            .team-block .team-flag {
                font-size: 2rem;
            }
            .score-center .score-num {
                font-size: 2rem;
            }
            .autocomplete-item {
                padding: 10px 12px;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <a href="#" class="logo" onclick="resetToWelcome()" title="Về trang chủ">
            <div class="logo-icon">⚽</div>
            <span>Bet</span><span class="highlight">Hub</span>
        </a>
        <div class="search-wrapper">
            <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="🔍  Tìm trận đấu... (VD: Man United vs Liverpool, Real Madrid, Champions League...)"
            autocomplete="off"
            >
            <span class="search-icon">🔍</span>
            <div class="autocomplete-dropdown" id="autocompleteDropdown"></div>
        </div>
    </header>

    <!-- MAIN -->
    <main class="main-container" id="mainContainer">
        <!-- Welcome State -->
        <div class="welcome-state" id="welcomeState">
            <div class="welcome-icon">📊</div>
            <h2>Chào mừng đến với BetHub</h2>
            <p>Gõ tên đội bóng hoặc trận đấu vào thanh tìm kiếm phía trên để xem thống kê, lịch sử đối đầu & tỷ lệ kèo chi tiết.</p>
            <p style="margin-top:12px;font-size:0.85rem;color:var(--text-muted);">Ví dụ: <strong style="color:#3fb950;">Man United</strong>, <strong style="color:#3fb950;">Real Madrid vs Barcelona</strong>, <strong style="color:#3fb950;">Champions League</strong></p>
        </div>

        <!-- Match Detail -->
        <div class="match-detail" id="matchDetail">
            <!-- Hero -->
            <div class="match-hero" id="matchHero"></div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="tab-stats">📊 Thống kê</button>
                <button class="tab-btn" data-tab="tab-h2h">⚔️ Lịch sử đối đầu</button>
                <button class="tab-btn" data-tab="tab-odds">💰 Tỷ lệ kèo</button>
                <button class="tab-btn" data-tab="tab-percent">🎯 Phần trăm</button>
            </div>

            <!-- Tab: Thống kê -->
            <div class="tab-content active" id="tab-stats"></div>
            <!-- Tab: Lịch sử đối đầu -->
            <div class="tab-content" id="tab-h2h"></div>
            <!-- Tab: Tỷ lệ kèo -->
            <div class="tab-content" id="tab-odds"></div>
            <!-- Tab: Phần trăm -->
            <div class="tab-content" id="tab-percent"></div>
        </div>
    </main>

    <script>
        (function() {
            // ==================== DATA ====================
            const teamsDB = {
                'manchester united': { name: 'Manchester United', flag: '🔴', short: 'MUN' },
                'man utd': { name: 'Manchester United', flag: '🔴', short: 'MUN' },
                'mu': { name: 'Manchester United', flag: '🔴', short: 'MUN' },
                'manchester city': { name: 'Manchester City', flag: '🔵', short: 'MCI' },
                'man city': { name: 'Manchester City', flag: '🔵', short: 'MCI' },
                'liverpool': { name: 'Liverpool', flag: '🟥', short: 'LIV' },
                'arsenal': { name: 'Arsenal', flag: '🔴⚪', short: 'ARS' },
                'chelsea': { name: 'Chelsea', flag: '🔵🦁', short: 'CHE' },
                'barcelona': { name: 'Barcelona', flag: '🔵🔴', short: 'BAR' },
                'real madrid': { name: 'Real Madrid', flag: '⚪👑', short: 'RMA' },

            // Generate H2H from matches for relevant pairs
            function generateH2H(teamA, teamB) {
                const h2h = [];
                // Find all matches between these two teams
                matches.forEach(m => {
                    const hKey = m.home.toLowerCase();
                    const aKey = m.away.toLowerCase();
                    if ((hKey === teamA && aKey === teamB) || (hKey === teamB && aKey === teamA)) {
                        h2h.push({
                            date: m.date,
                            league: m.league,
                            home: m.home,
                            away: m.away,
                            score: m.score,
                            homeGoals: m.homeGoals,
                            awayGoals: m.awayGoals,
                        });
                    }
                });
                // If not enough, generate synthetic historical data
                if (h2h.length < 5) {
                    const synthetic = generateSyntheticH2H(teamA, teamB, 8 - h2h.length);
                    h2h.push(...synthetic);
                }
                // Sort by date descending
                h2h.sort((a, b) => new Date(b.date) - new Date(a.date));
                return h2h.slice(0, 10);
            }

            function generateSyntheticH2H(teamA, teamB, count) {
                const results = [];
                const teamAName = (teamsDB[teamA] || { name: teamA }).name || teamA;
                const teamBName = (teamsDB[teamB] || { name: teamB }).name || teamB;
                const leagues = ['Premier League', 'Champions League', 'FA Cup', 'La Liga', 'Serie A'];
                const baseYear = 2024;
                for (let i = 0; i < count; i++) {
                    const hg = Math.floor(Math.random() * 4);
                    const ag = Math.floor(Math.random() * 4);
                    const month = String(Math.floor(Math.random() * 12) + 1).padStart(2, '0');
                    const day = String(Math.floor(Math.random() * 28) + 1).padStart(2, '0');
                    const year = baseYear - Math.floor(i / 3);
                    results.push({
                        date: `${year}-${month}-${day}`,
                        league: leagues[Math.floor(Math.random() * leagues.length)],
                        home: Math.random() > 0.5 ? teamAName : teamBName,
                        away: Math.random() > 0.5 ? teamBName : teamAName,
                        score: `${hg} - ${ag}`,
                        homeGoals: hg,
                        awayGoals: ag,
                    });
                }
                return results;
            }

                    .replace(/đ/g, 'd')
                    .trim();
            }

            function searchMatches(query) {
                const q = normalize(query);
                if (!q) return allMatchesForSearch;
                const tokens = q.split(/\s+/).filter(Boolean);
                return allMatchesForSearch.filter(m => {
                    const hName = (teamsDB[m.home] || { name: m.home }).name;
                    const aName = (teamsDB[m.away] || { name: m.away }).name;
                    const hShort = (teamsDB[m.home] || { short: m.home }).short;
                    const aShort = (teamsDB[m.away] || { short: m.away }).short;
                    const combined = normalize(
                        `${hName} ${aName} ${hShort} ${aShort} ${m.league} ${m.home} ${m.away}`
                    );
                    return tokens.every(t => combined.includes(t));
                });
            }

                                </div>
                            </div>
                            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">${draws}/${totalH2H} trận</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">🔴</div>
                            <div class="stat-value red">${aWinPercent}%</div>
                            <div class="stat-label">${aTeam.name} thắng</div>
                            <div class="progress-group" style="margin-top:8px;">
                                <div class="progress-bar-wrap">
                                    <div class="progress-bar-fill fill-red" style="width:${aWinPercent}%;"></div>
                                </div>
                            </div>
                            <div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;">${aWins}/${totalH2H} trận</div>
                        </div>
                    </div>
                    <div class="stat-card" style="margin-top:16px;text-align:center;">
                        <div class="stat-icon">📈</div>
                        <div style="font-size:1.2rem;font-weight:700;color:var(--accent2);">Dự đoán: ${hWinPercent > aWinPercent ? hTeam.name + ' có lợi thế hơn' : (aWins > hWins ? aTeam.name + ' có lợi thế hơn' : 'Cân bằng')}</div>
                        <div class="stat-label" style="margin-top:4px;">Dựa trên ${totalH2H} lần đối đầu gần nhất</div>
                    </div>
                `;

                // Reset tabs
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelector('.tab-btn[data-tab="tab-stats"]').classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tabStats.classList.add('active');
            }

            // ==================== EVENT LISTENERS ====================
            searchInput.addEventListener('input', () => {
                const query = searchInput.value.trim();
                if (!query) {
                    autocompleteDropdown.classList.remove('active');
                    if (!currentMatch) {
                        welcomeState.style.display = '';
                        matchDetail.classList.remove('active');
                    }
                    return;
                }
                const results = searchMatches(query);
                renderAutocomplete(results);
            });

            searchInput.addEventListener('focus', () => {
                const query = searchInput.value.trim();
                if (query) {
                    const results = searchMatches(query);
                    renderAutocomplete(results);
                } else if (!currentMatch) {
                    // Show all matches on focus when empty
                    renderAutocomplete(allMatchesForSearch);
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-wrapper')) {
                    autocompleteDropdown.classList.remove('active');
                }
            });

            // Tab switching
            document.querySelector('.tabs').addEventListener('click', (e) => {
                if (e.target.classList.contains('tab-btn')) {
                    const tabId = e.target.getAttribute('data-tab');
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove(
                        'active'));
                    e.target.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove(
                        'active'));
                    document.getElementById(tabId).classList.add('active');
                }
            });

            // Keyboard navigation
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    autocompleteDropdown.classList.remove('active');
                    searchInput.blur();
                }
                if (e.key === 'Enter') {
                    const query = searchInput.value.trim();
                    if (query) {
                        const results = searchMatches(query);
                        if (results.length > 0) {
                            selectMatch(results[0]);
                        }
                    }
                    autocompleteDropdown.classList.remove('active');
                }
            });

            // Expose reset function globally
            window.resetToWelcome = resetToWelcome;

            console.log('⚽ BetHub sẵn sàng! Gõ tên đội hoặc trận đấu vào thanh tìm kiếm.');
            console.log('📊 Dữ liệu mẫu: ' + allMatchesForSearch.length + ' trận đấu có sẵn.');
            console.log('💡 Gợi ý: "Man United", "Real Madrid vs Barcelona", "Champions League", "Liverpool"...');
        })();
    </script>
</body>
</html>
